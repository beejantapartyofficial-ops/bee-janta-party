<script>

document.addEventListener('DOMContentLoaded', () => {

/* SUPPORTER FORM */

const supporterForm =
document.getElementById('supporter-form')

if(supporterForm){

supporterForm.addEventListener('submit', async (e) => {

e.preventDefault()

const name =
document.getElementById('supporter-name').value

const city =
document.getElementById('supporter-city').value

const whatsapp =
document.getElementById('supporter-whatsapp').value

const instagram =
document.getElementById('supporter-instagram').value

const interests =
document.getElementById('supporter-interests').value

const { error } = await supabaseClient
.from('supporters')
.insert([
{
name,
city,
whatsapp,
instagram,
interests
}
])

if(error){

console.log(error)
alert('Something went wrong.')

}else{

alert('🐝 Welcome To The Hive!')
supporterForm.reset()

}

})

}
